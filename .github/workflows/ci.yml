name: dp bundle check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ensure .dp is not tracked
        run: |
          if git ls-files | rg -q '^\.dp/'; then
            echo 'tracked .dp files are not allowed in dp-skill-source'
            git ls-files | rg '^\.dp/'
            exit 1
          fi
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Validate bundle
        run: python -B scripts/validate_bundle.py
      - name: Run unit tests
        run: python -B scripts/test_helpers.py
